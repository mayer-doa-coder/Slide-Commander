<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#020817"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>SlideCommander</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Design tokens + adaptive scale ────────────────────────────────────── */
    :root {
      --blue:  #3b82f6;
      --cyan:  #22d3ee;
      --slate: #0f172a;

      /* Fluid layout dimensions — portrait phone baseline */
      --orb:      clamp(140px, 44vmin, 196px);
      --nav-h:    clamp(68px, 10.5svh, 88px);
      --seg-h:    clamp(44px, 6.5svh, 56px);
      --dock-pt:  clamp(8px,  1.4svh, 14px);
      --dock-pb:  clamp(16px, 4.5svh, 28px);
      --dock-gap: clamp(6px,  1.1svh, 10px);
      --dock-px:  clamp(12px, 4vw,    20px);
      --viz-gap:  clamp(8px,  1.8svh, 18px);
      --f-orb-icon: clamp(1.5rem, 5vmin, 2.2rem);
      --f-orb-cmd:  clamp(.7rem,  2.1vmin, .85rem);
      --f-nav-btn:  clamp(.72rem, 2.2vw,   .82rem);
      --f-seg-btn:  clamp(.63rem, 1.9vw,   .73rem);
      --f-timer:    clamp(1.2rem, 4.5vw,   1.55rem);
      --f-btn-t:    clamp(.6rem,  1.8vw,   .7rem);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    body {
      background: #020817;
      color: #e2e8f0;
      height: 100vh;          /* legacy fallback */
      height: 100svh;         /* excludes browser chrome — best for mobile */
      height: 100dvh;         /* dynamic — updates as chrome shows/hides */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    button { touch-action: manipulation; cursor: pointer; border: none; background: none; }

    /* ── Canvas particle bg ──────────────────────────────────────────────────── */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Layering ─────────────────────────────────────────────────────────────── */
    header, .voice-strip, .viz-area, .ctrl-dock { position: relative; z-index: 1; }

    /* ── Glass panels ────────────────────────────────────────────────────────── */
    .glass {
      background: rgba(8,14,28,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(148,163,184,0.07);
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: clamp(10px, 2svh, 16px) clamp(14px, 4vw, 24px);
      flex-shrink: 0;
    }
    .logo { font-size: clamp(.95rem, 3vw, 1.15rem); font-weight: 700; letter-spacing: -0.01em; }
    .logo-hi { color: #60a5fa; text-shadow: 0 0 18px rgba(96,165,250,0.6); }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(148,163,184,0.1);
      border-radius: 99px;
      padding: 5px 12px;
    }
    .s-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 7px rgba(239,68,68,0.8);
      transition: background .4s, box-shadow .4s;
    }
    .s-dot.online { background:#34d399; box-shadow:0 0 8px rgba(52,211,153,0.9); }
    .s-label { font-size: .7rem; font-weight: 600; letter-spacing: .1em; color:#64748b; transition: color .4s; }
    .s-label.online { color: rgba(52,211,153,0.85); }

    /* ── Voice strip ─────────────────────────────────────────────────────────── */
    .voice-strip {
      display: flex; align-items: center; gap: 8px;
      padding: clamp(4px, .8svh, 7px) clamp(14px, 4vw, 24px);
      background: rgba(8,14,28,0.6);
      border-bottom: 1px solid rgba(148,163,184,0.05);
      flex-shrink: 0;
    }
    .mic-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #dc2626; box-shadow: 0 0 5px rgba(220,38,38,0.7);
      transition: background .4s, box-shadow .4s;
    }
    .mic-dot.active { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.8); }
    .voice-label { font-size: .65rem; font-weight: 600; letter-spacing: .12em; color: #475569; }
    #voice-state { color: #475569; font-size: .65rem; font-weight: 700; letter-spacing: .1em; }
    #voice-state.active { color: #34d399; }
    #last-vcmd { margin-left: auto; font-size: .65rem; font-weight: 700;
                 letter-spacing: .12em; color: rgba(96,165,250,.7); }

    /* ── Waveform bars ───────────────────────────────────────────────────────── */
    .waveform {
      display: flex; align-items: center; gap: 2px; height: 14px;
      margin-left: 6px;
    }
    .wb {
      width: 2px; border-radius: 1px;
      background: rgba(96,165,250,0.4);
      transform-origin: center;
      animation: wbar var(--d,.9s) ease-in-out infinite var(--dl,0s);
      opacity: .4;
    }
    .wb.paused { animation-play-state: paused; height: 3px !important; opacity: .2; }
    @keyframes wbar {
      0%,100% { height: 3px; opacity: .3; }
      50%     { height: var(--h,10px); opacity: .7; }
    }

    /* ── Viz area ────────────────────────────────────────────────────────────── */
    .viz-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--viz-gap);
      padding: clamp(6px, 1.5svh, 16px) clamp(14px, 4vw, 24px);
      min-height: 0;
    }

    /* ── Central orb ─────────────────────────────────────────────────────────── */
    .orb-wrap {
      position: relative;
      width: var(--orb); height: var(--orb);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* Scan ring: conic-gradient arc rotating */
    .scan-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg, transparent 255deg,
        rgba(96,165,250,.15) 285deg,
        rgba(96,165,250,.65) 360deg
      );
      animation: scan 3.5s linear infinite;
    }
    @keyframes scan { to { transform: rotate(360deg); } }

    /* Outer breathing ring */
    .ring-outer {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(96,165,250,.22);
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform:scale(1); opacity:.22; }
      50%      { transform:scale(1.035); opacity:.5; }
    }

    /* Inner ring */
    .ring-inner {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid rgba(96,165,250,.35);
      box-shadow: 0 0 22px rgba(59,130,246,.18), inset 0 0 22px rgba(59,130,246,.07);
    }

    /* Orb core */
    .orb-core {
      position: relative;
      width: var(--orb); height: var(--orb);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%,
        rgba(59,130,246,.09) 0%, rgba(8,14,28,.95) 65%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      overflow: hidden;
    }

    /* Pulse emitters (JS-spawned) */
    .pulse-emit {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid rgba(96,165,250,.7);
      animation: pulse-out .7s ease-out forwards;
      pointer-events: none;
    }
    @keyframes pulse-out {
      from { transform:scale(.95); opacity:.8; }
      to   { transform:scale(2.4); opacity:0; }
    }

    /* Orb text content */
    .orb-icon { font-size: var(--f-orb-icon); line-height: 1; transition: opacity .2s; }
    .orb-cmd  {
      font-size: var(--f-orb-cmd); font-weight: 700; letter-spacing: .18em;
      color: #93c5fd; text-shadow: 0 0 12px rgba(96,165,250,.5);
      transition: opacity .2s;
    }
    .orb-sub  { font-size: .6rem; letter-spacing: .1em; color: #334155; margin-top: 2px; }
    #latency  { font-family: 'Space Mono', monospace; font-size: .56rem; color: #1e40af; letter-spacing: .06em; }

    /* ── Command history ticker ───────────────────────────────────────────────── */
    .cmd-history {
      display: flex; align-items: center; gap: 8px;
      height: 18px;
    }
    .hist-item {
      font-size: .6rem; font-weight: 700; letter-spacing: .14em;
      color: #1e3a5f;
      transition: all .3s;
    }
    .hist-item.fresh { color: #60a5fa; }
    .hist-sep { color: #0f2040; font-size: .5rem; }

    /* ── Control dock ────────────────────────────────────────────────────────── */
    .ctrl-dock {
      background: rgba(6,11,22,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(148,163,184,0.08);
      padding: var(--dock-pt) var(--dock-px) var(--dock-pb);
      display: flex; flex-direction: column; gap: var(--dock-gap);
      flex-shrink: 0;
      width: 100%;
    }

    /* Timer row */
    .timer-row {
      display: flex; align-items: center; gap: clamp(6px, 2vw, 12px);
    }
    #timer-display {
      font-family: 'Space Mono', monospace;
      font-size: var(--f-timer); font-weight: 700;
      color: #60a5fa;
      text-shadow: 0 0 18px rgba(96,165,250,.4);
      letter-spacing: .04em;
      flex: 1;
    }
    .btn-t {
      font-size: var(--f-btn-t); font-weight: 700; letter-spacing: .14em;
      color: #475569;
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(148,163,184,.1);
      border-radius: 1rem;
      padding: clamp(6px, 1svh, 10px) clamp(12px, 3.5vw, 18px);
      transition: transform 120ms ease, background 120ms ease, color 120ms ease;
      white-space: nowrap;
    }
    .btn-t:active { transform: scale(.93); background: rgba(30,41,59,1); color: #94a3b8; }

    /* Navigation row */
    .nav-row { display: flex; gap: clamp(6px, 2vw, 10px); width: 100%; }

    /* FIRST / LAST ghost segments */
    .seg-bar {
      display: flex;
      width: 100%;
      background: rgba(15,23,42,.5);
      border: 1px solid rgba(148,163,184,.1);
      border-radius: 1rem;
      overflow: hidden;
      height: var(--seg-h);
    }
    .seg-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: var(--f-seg-btn); font-weight: 700; letter-spacing: .14em; color: #475569;
      transition: background 120ms ease, color 120ms ease;
      position: relative; overflow: hidden;
    }
    .seg-btn + .seg-btn { border-left: 1px solid rgba(148,163,184,.08); }
    .seg-btn:active { background: rgba(96,165,250,.08); color: #94a3b8; }

    /* BACK and NEXT — equal size, style differentiates them */
    .btn-back,
    .btn-next {
      flex: 1;
      height: var(--nav-h);
      border-radius: 1rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      font-size: var(--f-nav-btn); font-weight: 700; letter-spacing: .14em;
      position: relative; overflow: hidden;
      transition: transform 130ms ease, background 130ms ease, box-shadow 130ms ease;
    }

    .btn-back {
      background: rgba(30,41,59,.6);
      border: 1px solid rgba(148,163,184,.13);
      color: #94a3b8;
    }
    .btn-back:active { transform: scale(.95); background: rgba(51,65,85,.8); }

    .btn-next {
      background: linear-gradient(150deg,
        rgba(29,78,216,.55) 0%,
        rgba(59,130,246,.30) 50%,
        rgba(37,99,235,.20) 100%);
      border: 1px solid rgba(96,165,250,.38);
      box-shadow: 0 0 28px rgba(59,130,246,.18),
                  inset 0 0 24px rgba(59,130,246,.08),
                  inset 0 1px 0 rgba(255,255,255,.07);
      color: #93c5fd;
      text-shadow: 0 0 12px rgba(96,165,250,.5);
    }
    .btn-next:active {
      transform: scale(.95);
      box-shadow: 0 0 44px rgba(59,130,246,.5),
                  inset 0 0 36px rgba(59,130,246,.16),
                  inset 0 1px 0 rgba(255,255,255,.09);
    }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      width: 80px; height: 80px;
      margin-left: -40px; margin-top: -40px;
      background: rgba(96,165,250,.2);
      animation: rpl .55s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rpl {
      from { transform:scale(0); opacity:1; }
      to   { transform:scale(3.5); opacity:0; }
    }

    /* ── Landscape phone (height < 500px) ───────────────────────────────────── */
    @media (max-height: 499px) {
      :root {
        --orb:      clamp(90px, 32vh, 120px);
        --nav-h:    clamp(50px, 13vh, 62px);
        --seg-h:    clamp(34px, 9vh,  42px);
        --dock-pt:  4px;
        --dock-pb:  6px;
        --dock-gap: 4px;
        --viz-gap:  4px;
        --f-orb-icon: 1.2rem;
        --f-orb-cmd:  .65rem;
        --f-timer:    1.1rem;
      }
      .voice-strip { padding: 3px clamp(12px, 4vw, 20px); }
      .orb-sub     { display: none; }
      #latency     { display: none; }
      .cmd-history { display: none; }
    }

    /* ── Compact portrait — small phones (500px–720px height) ───────────────── */
    @media (min-height: 500px) and (max-height: 720px) {
      :root {
        --orb:      clamp(130px, 38vmin, 158px);
        --nav-h:    clamp(62px, 9.5svh, 76px);
        --seg-h:    clamp(40px, 5.8svh, 50px);
        --dock-pb:  clamp(12px, 3svh, 20px);
        --dock-gap: clamp(5px, .9svh, 8px);
        --viz-gap:  clamp(6px, 1.4svh, 12px);
      }
    }

    /* ── Tablet / wide screen (min-width 600px) ─────────────────────────────── */
    @media (min-width: 600px) {
      body { align-items: center; }
      header, .voice-strip {
        width: 100%;
        max-width: 540px;
      }
      .viz-area  { max-width: 540px; width: 100%; }
      .ctrl-dock { max-width: 540px; border-radius: 1.5rem 1.5rem 0 0; }
      :root {
        --orb:   clamp(170px, 28vmin, 220px);
        --nav-h: clamp(80px, 9svh, 100px);
        --seg-h: clamp(52px, 6svh,  64px);
      }
    }

    /* ── Large tablet / desktop (min-width 900px) ───────────────────────────── */
    @media (min-width: 900px) {
      :root { --orb: 210px; --nav-h: 96px; --seg-h: 60px; }
      .ctrl-dock { max-width: 480px; }
      header, .voice-strip, .viz-area { max-width: 480px; }
    }
  </style>
</head>
<body>

<!-- ── Particle canvas ─────────────────────────────────────────────────────── -->
<canvas id="bg"></canvas>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="glass">
  <div class="logo">
    <span class="logo-hi">SLIDE</span><span style="color:#cbd5e1;">COMMANDER</span>
  </div>
  <div class="status-pill">
    <span class="s-dot" id="s-dot"></span>
    <span class="s-label" id="s-label">OFFLINE</span>
  </div>
</header>

<!-- ── Voice + waveform strip ─────────────────────────────────────────────── -->
<div class="voice-strip">
  <span class="mic-dot" id="mic-dot"></span>
  <span class="voice-label">MIC</span>
  <span id="voice-state">OFF</span>
  <div class="waveform" id="waveform">
    <!-- 14 bars; heights and delays set in JS -->
  </div>
  <span id="last-vcmd"></span>
</div>

<!-- ── Viz area ────────────────────────────────────────────────────────────── -->
<div class="viz-area">

  <!-- Central orb -->
  <div class="orb-wrap">
    <div class="scan-ring"></div>
    <div class="ring-outer"></div>
    <div class="ring-inner"></div>
    <div class="orb-core" id="orb-core">
      <div class="orb-icon" id="orb-icon">◈</div>
      <div class="orb-cmd"  id="orb-cmd">STANDBY</div>
      <div class="orb-sub"  id="orb-sub">AWAITING COMMAND</div>
      <div id="latency"></div>
    </div>
  </div>

  <!-- Command history ticker -->
  <div class="cmd-history" id="cmd-history">
    <span class="hist-item" style="opacity:.15">— — —</span>
  </div>

</div>

<!-- ── Control dock ────────────────────────────────────────────────────────── -->
<div class="ctrl-dock">

  <!-- Timer -->
  <div class="timer-row">
    <span id="timer-display">00:00</span>
    <button class="btn-t" id="btn-ts" onclick="timerToggle()">START</button>
    <button class="btn-t" onclick="timerReset()">RESET</button>
  </div>

  <!-- FIRST / LAST segmented ghost bar -->
  <div class="seg-bar">
    <button class="seg-btn cmd-btn" data-action="first">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5"/>
      </svg>
      FIRST
    </button>
    <button class="seg-btn cmd-btn" data-action="last">
      LAST
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

  <!-- BACK / NEXT primary row -->
  <div class="nav-row">
    <button class="btn-back cmd-btn" data-action="back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      BACK
    </button>
    <button class="btn-next cmd-btn" data-action="next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" style="filter:drop-shadow(0 0 5px rgba(96,165,250,.6))">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      NEXT
    </button>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// ── Particle canvas ────────────────────────────────────────────────────────
(function () {
  const cv = document.getElementById('bg');
  const cx = cv.getContext('2d');
  const N  = 55;
  const LINK_DIST = 110;
  let W, H, pts;

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  function mkPt() {
    return {
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - .5) * .28,
      vy: (Math.random() - .5) * .28,
      r:  Math.random() * 1.4 + .4,
      o:  Math.random() * .35 + .08,
    };
  }

  function init() { pts = Array.from({length: N}, mkPt); }

  function frame() {
    cx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, 6.28);
      cx.fillStyle = `rgba(96,165,250,${p.o})`;
      cx.fill();
    });
    for (let i = 0; i < N; i++) {
      for (let j = i+1; j < N; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < LINK_DIST) {
          cx.beginPath();
          cx.moveTo(pts[i].x, pts[i].y);
          cx.lineTo(pts[j].x, pts[j].y);
          cx.strokeStyle = `rgba(59,130,246,${.055*(1-d/LINK_DIST)})`;
          cx.lineWidth = .6;
          cx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', () => { resize(); });
  resize(); init(); frame();
})();

// ── Waveform bars ──────────────────────────────────────────────────────────
(function () {
  const wf = document.getElementById('waveform');
  const heights = [5,9,12,7,13,10,5,12,8,14,6,10,8,5];
  const delays  = [0,.1,.2,.05,.15,.25,.08,.18,.3,.06,.22,.12,.28,.04];
  const durations = [.8,.7,.9,.65,.85,.75,.95,.7,.8,.65,.9,.75,.85,.7];
  heights.forEach((h,i) => {
    const b = document.createElement('div');
    b.className = 'wb paused';
    b.style.setProperty('--h', h+'px');
    b.style.setProperty('--d', durations[i]+'s');
    b.style.setProperty('--dl', delays[i]+'s');
    b.style.height = '3px';
    wf.appendChild(b);
  });
})();

// ── Timer ──────────────────────────────────────────────────────────────────
let _secs=0, _htimer=null;
function _tick() {
  _secs++;
  const m=String(Math.floor(_secs/60)).padStart(2,'0');
  const s=String(_secs%60).padStart(2,'0');
  document.getElementById('timer-display').textContent=`${m}:${s}`;
}
function timerToggle() {
  const btn=document.getElementById('btn-ts');
  if (_htimer) { clearInterval(_htimer); _htimer=null; btn.textContent='START'; }
  else         { _htimer=setInterval(_tick,1000); btn.textContent='PAUSE'; }
}
function timerReset() {
  clearInterval(_htimer); _htimer=null; _secs=0;
  document.getElementById('timer-display').textContent='00:00';
  document.getElementById('btn-ts').textContent='START';
}

// ── Orb feedback ───────────────────────────────────────────────────────────
const ICONS = { next:'→', back:'←', first:'«', last:'»', pause:'⏸', default:'◈' };
const LABELS = { next:'NEXT', back:'BACK', first:'FIRST', last:'LAST', pause:'PAUSE' };
let _orbTimeout;

function orbFlash(action) {
  const core  = document.getElementById('orb-core');
  const icon  = document.getElementById('orb-icon');
  const cmd   = document.getElementById('orb-cmd');
  const sub   = document.getElementById('orb-sub');

  // Emit pulse rings
  for (let i=0; i<2; i++) {
    const p = document.createElement('div');
    p.className = 'pulse-emit';
    p.style.animationDelay = (i*0.18)+'s';
    core.appendChild(p);
    p.addEventListener('animationend', ()=>p.remove());
  }

  icon.textContent = ICONS[action] || ICONS.default;
  icon.style.color = '#93c5fd';
  icon.style.textShadow = '0 0 20px rgba(96,165,250,.7)';
  cmd.textContent  = LABELS[action] || action.toUpperCase();
  sub.textContent  = '';

  clearTimeout(_orbTimeout);
  _orbTimeout = setTimeout(()=>{
    icon.textContent = ICONS.default;
    icon.style.color = '';
    icon.style.textShadow = '';
    cmd.textContent  = 'STANDBY';
    sub.textContent  = 'AWAITING COMMAND';
  }, 1800);
}

// ── Command history ────────────────────────────────────────────────────────
const _hist = [];
function addHistory(action) {
  _hist.unshift(action.toUpperCase());
  if (_hist.length > 4) _hist.pop();
  const el = document.getElementById('cmd-history');
  el.innerHTML = _hist.map((c,i) =>
    `<span class="hist-item${i===0?' fresh':''}" style="opacity:${1-i*.22}">${c}</span>`
    + (i < _hist.length-1 ? '<span class="hist-sep">›</span>' : '')
  ).join('');
}

// ── Ripple ─────────────────────────────────────────────────────────────────
function addRipple(e) {
  const btn  = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const cx   = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy   = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const r    = document.createElement('span');
  r.className = 'ripple';
  r.style.left = cx+'px'; r.style.top = cy+'px';
  btn.appendChild(r);
  r.addEventListener('animationend', ()=>r.remove());
}

// ── Socket.IO ──────────────────────────────────────────────────────────────
const $sdot   = document.getElementById('s-dot');
const $slabel = document.getElementById('s-label');
const $micdot = document.getElementById('mic-dot');
const $vstate = document.getElementById('voice-state');
const $vcmd   = document.getElementById('last-vcmd');
const $lat    = document.getElementById('latency');

// ── Socket events ──────────────────────────────────────────────────────────
const socket = io({ reconnectionDelay:1000, reconnectionDelayMax:5000 });

socket.on('connect', () => {
  $sdot.classList.add('online');
  $slabel.classList.add('online');
  $slabel.textContent = 'ONLINE';
});
socket.on('disconnect', () => {
  $sdot.classList.remove('online');
  $slabel.classList.remove('online');
  $slabel.textContent = 'OFFLINE';
});

let _voiceIdleTimer = null;
function _voiceIdle() {
  $micdot.classList.remove('active');
  $vstate.textContent = 'OFF'; $vstate.classList.remove('active');
  $vcmd.textContent = '';
  document.querySelectorAll('.wb').forEach(b => b.classList.add('paused'));
}

socket.on('ack', data => {
  if (data.latency_ms != null) $lat.textContent = data.latency_ms + 'ms';
  if (data.source === 'voice') {
    $micdot.classList.add('active');
    $vstate.textContent = 'ON'; $vstate.classList.add('active');
    $vcmd.textContent = data.action.toUpperCase();
    document.querySelectorAll('.wb').forEach(b => b.classList.remove('paused'));
    clearTimeout(_voiceIdleTimer);
    _voiceIdleTimer = setTimeout(_voiceIdle, 5000);
  }
});

// ── Slide commands ─────────────────────────────────────────────────────────
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const action = btn.dataset.action;
    addRipple(e);
    orbFlash(action);
    addHistory(action);
    socket.emit('command', { action, source: 'button', ts: Date.now() });
  });
  btn.addEventListener('touchstart', addRipple, { passive: true });
});
</script>
</body>
</html>
